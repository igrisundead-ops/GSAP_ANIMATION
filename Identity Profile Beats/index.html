<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Profile Beat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root{--bg1:#dddddd;--bg2:#d2d2d2;--ink:#6a1f37;--text:#2f2f2f}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;overflow:hidden;
      font-family:Georgia,"Times New Roman",serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .stage{
      position:relative;width:min(100vw,720px);height:100vh;aspect-ratio:9/16;
      margin:auto;overflow:hidden;background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .asset{
      position:absolute;right:-18px;top:50%;
      width:380px;height:760px;
      transform:translateY(-54%);
      filter:drop-shadow(0 24px 40px rgba(0,0,0,.18));
      opacity:.96;
    }
    .asset img{width:100%;height:100%;object-fit:contain;display:block}
    .copy{position:absolute;left:52px;right:52px;bottom:120px;z-index:3}
    .kicker{
      font-family:Arial,Helvetica,sans-serif;font-size:26px;
      color:var(--text);margin-bottom:10px;opacity:0;
    }
    .headline{
      font-size:clamp(54px,7.2vw,84px);
      line-height:.88;letter-spacing:-.055em;color:var(--ink);
    }
    .headline .char{display:inline-block;opacity:0}
  </style>
</head>
<body>
  <div class="stage">
    <div class="asset">
      <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6?auto=format&fit=crop&w=900&q=80" alt="Profile asset" />
    </div>

    <div class="copy">
      <div class="kicker">They recognize</div>
      <h1 class="headline" id="headline">identities</h1>
    </div>
  </div>

  <script>
    const headline = document.getElementById("headline");
    headline.innerHTML = headline.textContent.split("").map(c =>
      c === " " ? `<span class="char">&nbsp;</span>` : `<span class="char">${c}</span>`
    ).join("");

    gsap.timeline()
      .fromTo(".asset",
        { x: 170, scale: .92, filter: "blur(20px)" },
        { x: 0, scale: 1, filter: "blur(0px)", duration: 1.05, ease: "power3.out" }
      )
      .fromTo(".kicker",
        { y: 24, opacity: 0, filter: "blur(8px)" },
        { y: 0, opacity: 1, filter: "blur(0px)", duration: .5, ease: "power2.out" },
        "-=.55"
      )
      .fromTo(".headline .char",
        { y: 34, opacity: 0, filter: "blur(10px)" },
        { y: 0, opacity: 1, filter: "blur(0px)", stagger: .016, duration: .56, ease: "power3.out" },
        "-=.3"
      )
      .to(".asset", {
        y: "-=12",
        duration: 1.6,
        yoyo: true,
        repeat: -1,
        ease: "sine.inOut"
      });
  </script>
</body>
</html>
