<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiet Authority Hero</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    :root {
      --bg1: #2a0000;
      --bg2: #7a0000;
      --bg3: #b10808;
      --text: rgba(255, 255, 255, 0.18);
      --text-strong: rgba(255, 255, 255, 0.24);
      --muted: rgba(255, 255, 255, 0.58);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: #0a0a0a;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 26%, rgba(255,255,255,0.06), transparent 20%),
        linear-gradient(120deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,0.25) 0.6px, transparent 0.8px),
        radial-gradient(circle at 75% 35%, rgba(255,255,255,0.18) 0.6px, transparent 0.8px),
        radial-gradient(circle at 45% 80%, rgba(255,255,255,0.20) 0.5px, transparent 0.8px);
      background-size: 22px 22px, 27px 27px, 24px 24px;
      mix-blend-mode: soft-light;
    }

    .headline-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 1;
      pointer-events: none;
    }

    .headline {
      margin: 0;
      text-align: center;
      text-transform: uppercase;
      line-height: 0.88;
      letter-spacing: -0.06em;
      font-size: clamp(52px, 9vw, 140px);
      font-weight: 800;
      color: var(--text);
      filter: blur(16px);
      opacity: 0;
      transform: translateY(26px);
      will-change: transform, opacity, filter;
    }

    .headline .line {
      display: block;
    }

    .headline .accent {
      color: var(--text-strong);
    }

    .kicker {
      position: absolute;
      left: 7vw;
      bottom: 7vh;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: clamp(12px, 1.2vw, 16px);
      color: var(--muted);
      opacity: 0;
      transform: translateY(12px);
      will-change: transform, opacity;
    }

    .asset-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(38vw, 430px);
      aspect-ratio: 0.72;
      z-index: 3;
      transform: translate(-50%, -50%);
      will-change: transform, opacity, filter;
    }

    .asset-shadow {
      position: absolute;
      left: 50%;
      bottom: -2%;
      width: 72%;
      height: 9%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,0.46) 0%, rgba(0,0,0,0) 72%);
      filter: blur(18px);
      opacity: 0.68;
      pointer-events: none;
    }

    .asset-glow {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 60%;
      height: 48%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,255,255,0.10), rgba(255,255,255,0) 72%);
      filter: blur(28px);
      opacity: 0.32;
      pointer-events: none;
    }

    .portrait {
      position: relative;
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 24px 38px rgba(0,0,0,0.28));
    }

    .portrait svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.18) 100%);
    }
  </style>
</head>
<body>
  <section class="stage">
    <div class="grain"></div>

    <div class="headline-wrap">
      <h1 class="headline" id="headline" aria-hidden="true">
        <span class="line">Quiet</span>
        <span class="line accent">Authority</span>
      </h1>
    </div>

    <div class="asset-wrap" id="assetWrap">
      <div class="asset-glow"></div>

      <div class="portrait" id="asset">
        <!-- Built-in visible SVG asset -->
        <svg viewBox="0 0 700 1000" xmlns="http://www.w3.org/2000/svg" aria-label="hero portrait">
          <defs>
            <linearGradient id="coatGrad" x1="0" x2="1">
              <stop offset="0%" stop-color="#0d1018"/>
              <stop offset="45%" stop-color="#171c28"/>
              <stop offset="100%" stop-color="#07090f"/>
            </linearGradient>

            <linearGradient id="skinGrad" x1="0" x2="1">
              <stop offset="0%" stop-color="#d9d4cc"/>
              <stop offset="100%" stop-color="#f1ece2"/>
            </linearGradient>

            <linearGradient id="hairGrad" x1="0" x2="1">
              <stop offset="0%" stop-color="#d7d0c5"/>
              <stop offset="100%" stop-color="#f3efe9"/>
            </linearGradient>

            <linearGradient id="specGrad" x1="0" x2="1">
              <stop offset="0%" stop-color="#1a1a1a"/>
              <stop offset="100%" stop-color="#050505"/>
            </linearGradient>
          </defs>

          <!-- coat body -->
          <path d="M450 365
                   C540 405 625 560 650 790
                   L670 1000
                   L110 1000
                   L160 815
                   C196 684 238 560 314 456
                   C344 415 386 384 450 365Z"
                fill="url(#coatGrad)"/>

          <!-- left shoulder -->
          <path d="M247 474
                   C186 515 144 603 121 724
                   C110 786 109 868 126 1000
                   L18 1000
                   L34 895
                   C53 785 72 709 97 642
                   C128 560 173 503 247 474Z"
                fill="#111622"/>

          <!-- waistcoat -->
          <path d="M368 420
                   C442 446 490 522 499 655
                   L508 1000
                   L252 1000
                   L257 647
                   C260 530 300 452 368 420Z"
                fill="#11151f"/>

          <!-- shirt -->
          <path d="M350 420
                   C385 432 412 470 425 532
                   L430 1000
                   L320 1000
                   L322 532
                   C327 476 333 440 350 420Z"
                fill="#ede7dc"/>

          <!-- tie -->
          <path d="M358 446
                   L390 520
                   L363 595
                   L336 520Z"
                fill="#0d1016"/>

          <!-- head -->
          <path d="M334 170
                   C393 132 478 153 521 212
                   C547 247 552 304 531 350
                   C510 398 468 429 417 434
                   C364 438 313 415 286 370
                   C257 322 266 218 334 170Z"
                fill="url(#skinGrad)"/>

          <!-- ear -->
          <path d="M516 294
                   C545 301 559 326 554 350
                   C549 376 530 388 510 383
                   C499 380 494 372 494 360
                   C495 340 500 307 516 294Z"
                fill="#ddd6cb"/>

          <!-- hair -->
          <path d="M324 177
                   C372 132 446 122 503 147
                   C550 168 579 214 580 258
                   C545 237 512 224 470 217
                   C430 209 384 208 333 218
                   C298 224 275 236 258 253
                   C260 225 280 198 324 177Z"
                fill="url(#hairGrad)"/>

          <path d="M280 255
                   C335 232 420 229 494 239
                   C539 245 570 260 586 278
                   C570 248 547 222 505 204
                   C448 180 374 181 324 202
                   C296 214 277 232 280 255Z"
                fill="#f4efe8" opacity="0.82"/>

          <!-- glasses -->
          <ellipse cx="350" cy="308" rx="42" ry="30" fill="url(#specGrad)"/>
          <ellipse cx="432" cy="320" rx="46" ry="32" fill="url(#specGrad)"/>
          <rect x="386" y="305" width="24" height="8" rx="4" fill="#111"/>
          <path d="M291 302 L307 297" stroke="#141414" stroke-width="7" stroke-linecap="round"/>
          <path d="M476 323 L497 330" stroke="#141414" stroke-width="7" stroke-linecap="round"/>

          <!-- nose shadow -->
          <path d="M414 286
                   C435 312 438 352 420 392
                   C410 412 396 428 378 437
                   C414 395 410 346 402 302Z"
                fill="#1a1d27" opacity="0.55"/>

          <!-- face shadow -->
          <path d="M397 215
                   C461 221 511 263 522 327
                   C530 377 509 421 463 435
                   C431 445 391 444 356 430
                   C418 404 451 342 448 278
                   C446 252 431 229 397 215Z"
                fill="#1b1f28" opacity="0.54"/>

          <!-- collar -->
          <path d="M330 420 L367 462 L344 511 L297 438Z" fill="#f0e9de"/>
          <path d="M402 420 L365 462 L389 512 L438 438Z" fill="#f0e9de"/>

          <!-- hand -->
          <path d="M216 452
                   C236 421 270 410 307 423
                   C334 433 352 452 354 480
                   C355 502 343 523 324 535
                   C306 546 283 546 264 540
                   C232 529 205 506 198 482
                   C194 469 199 456 216 452Z"
                fill="url(#skinGrad)"/>

          <!-- fingers -->
          <path d="M250 451 C243 435 259 422 276 425 C292 428 305 439 304 452 C303 466 286 471 269 468 C259 467 253 461 250 451Z"
                fill="#ece4d9"/>
          <path d="M281 430 C281 418 292 410 306 412 C321 414 334 425 333 438 C332 450 318 455 304 453 C291 451 282 443 281 430Z"
                fill="#f1ece2"/>

          <!-- cigarette -->
          <rect x="322" y="476" width="88" height="12" rx="6" fill="#f6f1e8" transform="rotate(-34 322 476)"/>
          <rect x="393" y="430" width="18" height="12" rx="3" fill="#c9ab7a" transform="rotate(-34 393 430)"/>

          <!-- lapels -->
          <path d="M300 438 L255 650 L343 605 L365 470Z" fill="#0b0e15"/>
          <path d="M441 444 L470 662 L392 611 L364 470Z" fill="#0a0d14"/>

          <!-- stripes -->
          <g opacity="0.34" stroke="#e8e2d8" stroke-width="2">
            <line x1="270" y1="505" x2="255" y2="1000"/>
            <line x1="290" y1="490" x2="280" y2="1000"/>
            <line x1="312" y1="476" x2="305" y2="1000"/>
            <line x1="334" y1="470" x2="332" y2="1000"/>
            <line x1="356" y1="470" x2="359" y2="1000"/>
            <line x1="378" y1="476" x2="385" y2="1000"/>
            <line x1="402" y1="492" x2="415" y2="1000"/>
            <line x1="427" y1="510" x2="450" y2="1000"/>
            <line x1="492" y1="464" x2="532" y2="1000"/>
            <line x1="520" y1="470" x2="575" y2="1000"/>
            <line x1="546" y1="490" x2="616" y2="1000"/>
          </g>

          <!-- chain -->
          <path d="M300 760
                   C338 725 402 725 447 764"
                fill="none" stroke="#6f7278" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
          <circle cx="300" cy="760" r="7" fill="#8d9197" opacity="0.45"/>
          <circle cx="447" cy="764" r="7" fill="#8d9197" opacity="0.45"/>
        </svg>
      </div>

      <div class="asset-shadow"></div>
    </div>

    <div class="vignette"></div>
  </section>

  <script>
    gsap.set("#assetWrap", {
      xPercent: -50,
      yPercent: -50,
      x: 0,
      y: 0,
      scale: 0.7,
      opacity: 0,
      filter: "blur(24px)"
    });

    gsap.set("#headline", {
      opacity: 0,
      y: 26,
      filter: "blur(16px)"
    });

    gsap.set("#kicker", {
      opacity: 0,
      y: 12
    });

    const tl = gsap.timeline({
      defaults: { ease: "power2.out" }
    });

    // Asset blur-in
    tl.to("#assetWrap", {
      opacity: 1,
      filter: "blur(0px)",
      duration: 0.55,
      ease: "power2.out"
    }, 0);

    // 70% to 100%
    tl.to("#assetWrap", {
      scale: 1,
      duration: 0.65,
      ease: "power2.out"
    }, 0.05);

    // Shift to lower-right quadrant
    tl.to("#assetWrap", {
      x: "24vw",
      y: "14vh",
      duration: 0.95,
      ease: "power2.inOut"
    }, 0.82);

    // Text appears behind after reposition
    tl.to("#headline", {
      opacity: 1,
      y: 0,
      filter: "blur(0px)",
      duration: 0.9,
      ease: "power2.out"
    }, 1.12);

    tl.to("#kicker", {
      opacity: 1,
      y: 0,
      duration: 0.5,
      ease: "power2.out"
    }, 1.38);

    // Ambient float
    gsap.to("#assetWrap", {
      y: "+=8",
      duration: 2.8,
      ease: "sine.inOut",
      yoyo: true,
      repeat: -1,
      delay: 1.9
    });

    gsap.to(".asset-glow", {
      opacity: 0.24,
      scale: 1.08,
      duration: 2.6,
      ease: "sine.inOut",
      yoyo: true,
      repeat: -1
    });

    gsap.to(".asset-shadow", {
      scaleX: 0.94,
      opacity: 0.52,
      duration: 2.8,
      ease: "sine.inOut",
      yoyo: true,
      repeat: -1
    });
  </script>
</body>
</html>
