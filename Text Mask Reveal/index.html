<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRUNO Text Mask Reveal</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 430px;
      height: 620px;
      background: #050505;
      overflow: hidden;
      isolation: isolate;
    }

    .ambient-glow {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255, 0, 0, 0.10) 0%, rgba(255, 0, 0, 0.03) 34%, rgba(0, 0, 0, 0) 72%);
      opacity: 0;
      filter: blur(24px);
    }

    .mask-stage {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
    }

    .mask-shadow {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
    }

    .mask-shadow-text {
      font-family: "Anton", sans-serif;
      font-size: 12.8rem;
      line-height: 0.82;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      color: rgba(255, 30, 30, 0.14);
      filter: blur(18px);
      transform: translateY(12px);
      white-space: nowrap;
    }

    .mask-text {
      position: relative;
      font-family: "Anton", sans-serif;
      font-size: 12.8rem;
      line-height: 0.82;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      color: transparent;
      -webkit-text-fill-color: transparent;
      background: url("https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1200&q=80")
        center 22% / cover no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      filter: blur(18px);
      opacity: 0;
      transform: translateY(34px) scale(1.035);
    }

    .mask-tint {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(215, 18, 18, 0.82), rgba(215, 18, 18, 0.82));
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .subline {
      position: absolute;
      left: 50%;
      bottom: 11%;
      z-index: 5;
      transform: translateX(-50%);
      font-family: "Anton", sans-serif;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: #d51f1f;
      opacity: 0;
      filter: blur(10px);
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.24) 74%, rgba(0,0,0,0.52) 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 1px,
          transparent 3px
        );
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="ambient-glow"></div>

    <div class="mask-shadow">
      <div class="mask-shadow-text">BRUNO</div>
    </div>

    <div class="mask-stage">
      <div class="mask-text">
        BRUNO
        <div class="mask-tint"></div>
      </div>
    </div>

    <div class="subline">Bruno Fernandes</div>

    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <script>
    const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

    tl.to(".ambient-glow", {
      opacity: 1,
      duration: 0.4,
      ease: "power2.out"
    });

    tl.to(".mask-shadow", {
      opacity: 1,
      duration: 0.35,
      ease: "power2.out"
    }, "<");

    tl.to(".mask-text", {
      opacity: 1,
      filter: "blur(0px)",
      y: 0,
      scale: 1,
      duration: 1.0,
      ease: "power4.out"
    }, "-=0.05");

    tl.fromTo(".subline",
      {
        opacity: 0,
        filter: "blur(10px)",
        y: 16
      },
      {
        opacity: 1,
        filter: "blur(0px)",
        y: 0,
        duration: 0.5,
        ease: "power3.out"
      },
      "-=0.22"
    );

    gsap.to(".ambient-glow", {
      opacity: 0.78,
      duration: 2.2,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });

    gsap.to(".grain", {
      opacity: 0.08,
      duration: 0.45,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });
  </script>
</body>
</html>
