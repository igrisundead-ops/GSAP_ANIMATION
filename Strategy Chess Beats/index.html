<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy Chess Beat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root{--bg1:#dddddd;--bg2:#d2d2d2;--ink:#6a1f37;--text:#2f2f2f}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;overflow:hidden;
      font-family:Georgia,"Baskerville",serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .stage{
      position:relative;width:min(100vw,720px);height:100vh;aspect-ratio:9/16;
      margin:auto;overflow:hidden;background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    .asset{
      position:absolute;left:50%;top:47%;
      width:230px;height:360px;transform:translate(-50%,-50%);
      filter:drop-shadow(0 24px 40px rgba(0,0,0,.18));
    }
    .asset img{width:100%;height:100%;object-fit:contain;display:block}
    .copy{
      position:absolute;left:50%;top:72%;transform:translateX(-50%);
      text-align:center;width:88%;
    }
    .kicker{
      font-family:Arial,Helvetica,sans-serif;font-size:26px;
      color:var(--text);margin-bottom:10px;opacity:0;
    }
    .headline{
      font-size:clamp(62px,8vw,100px);
      line-height:.88;letter-spacing:-.055em;color:var(--ink);
    }
    .headline .char{display:inline-block;opacity:0}
  </style>
</head>
<body>
  <div class="stage">
    <div class="asset">
      <img src="https://images.unsplash.com/photo-1528819622765-d6bcf132f793?auto=format&fit=crop&w=900&q=80" alt="Chess asset" />
    </div>

    <div class="copy">
      <h1 class="headline" id="headline">strategy</h1>
    </div>
  </div>

  <script>
    const headline = document.getElementById("headline");
    headline.innerHTML = headline.textContent.split("").map(c =>
      c === " " ? `<span class="char">&nbsp;</span>` : `<span class="char">${c}</span>`
    ).join("");

    gsap.timeline()
      .fromTo(".asset",
        { y: 100, scale: .72, filter: "blur(18px)" },
        { y: 0, scale: 1, filter: "blur(0px)", duration: .95, ease: "power3.out" }
      )
      .fromTo(".kicker",
        { y: 20, opacity: 0, filter: "blur(7px)" },
        { y: 0, opacity: 1, filter: "blur(0px)", duration: .45, ease: "power2.out" },
        "-=.56"
      )
      .fromTo(".headline .char",
        { y: 34, opacity: 0, filter: "blur(10px)" },
        { y: 0, opacity: 1, filter: "blur(0px)", stagger: .02, duration: .56, ease: "power3.out" },
        "-=.25"
      );
  </script>
</body>
</html>
