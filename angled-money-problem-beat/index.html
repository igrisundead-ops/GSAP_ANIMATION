<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>angled-money-problem-beat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root{
      --bg:#ece9df;
      --bg2:#e5e1d5;
      --ink:#121212;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111;
      font-family:Inter,system-ui,sans-serif;
    }
    .frame{
      position:relative;
      width:430px;
      height:760px;
      overflow:hidden;
      background:
        radial-gradient(circle at 25% 15%, rgba(255,255,255,.45), transparent 24%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--ink);
    }
    .pattern{
      position:absolute; inset:0; opacity:.22;
      background-image:repeating-linear-gradient(135deg, rgba(0,0,0,.08) 0 2px, transparent 2px 28px);
    }
    .barcode{
      position:absolute; top:22px; left:22px; width:54px; height:16px;
      background:repeating-linear-gradient(90deg,#111 0 2px,transparent 2px 4px);
      opacity:.8;
    }
    .headline{
      position:absolute;
      left:44px; top:240px;
      width:250px;
      font-size:52px;
      line-height:.92;
      letter-spacing:-.06em;
      font-weight:800;
    }
    .headline span{display:block}
    .asset-slot{
      position:absolute;
      width:150px; height:92px;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 24px 50px rgba(0,0,0,.16);
      background:linear-gradient(135deg,#738960,#c6d1b3 55%, #8da17a);
    }
    .asset-slot::before{
      content:"";
      position:absolute; inset:10px;
      border:2px solid rgba(22,40,18,.24);
      border-radius:9px;
    }
    .asset-slot::after{
      content:"₦";
      position:absolute; inset:0;
      display:grid; place-items:center;
      font-size:42px; font-weight:800;
      color:rgba(22,40,18,.45);
    }
    .money-a{ right:34px; top:132px; transform:rotate(18deg); }
    .money-b{ left:22px; bottom:142px; transform:rotate(-24deg); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="pattern"></div>
    <div class="barcode"></div>

    <!-- replace either div with img / video / animated html module -->
    <div class="asset-slot money-a"></div>
    <div class="asset-slot money-b"></div>

    <div class="headline">
      <span>Tired</span>
      <span>of poor</span>
      <span>marketing?</span>
    </div>
  </div>

  <script>
    gsap.set(".money-a",{x:110,y:-40,rotation:28,scale:.92,opacity:0,filter:"blur(12px)"});
    gsap.set(".money-b",{x:-110,y:60,rotation:-30,scale:.92,opacity:0,filter:"blur(12px)"});
    gsap.set(".headline",{y:26,opacity:0,filter:"blur(14px)"});

    const tl = gsap.timeline();
    tl.to(".money-a",{
      x:0,y:0,rotation:18,scale:1,opacity:1,filter:"blur(0px)",
      duration:1.25,ease:"expo.out"
    })
    .to(".money-b",{
      x:0,y:0,rotation:-24,scale:1,opacity:1,filter:"blur(0px)",
      duration:1.28,ease:"expo.out"
    },"<0.12")
    .to(".headline",{
      y:0,opacity:1,filter:"blur(0px)",
      duration:.9,ease:"power3.out"
    },"<0.22");
  </script>
</body>
</html>
