<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editorial Bust Reveal — Fixed</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    :root {
      --frame-width: 430px;
      --frame-height: 760px;

      --bg: #f3f1ee;
      --text-dark: #6e6a66;
      --accent: #b91e1e;
      --muted: #9a948d;
      --shadow: rgba(0, 0, 0, 0.12);

      --asset-width: 230px;
      --headline-size: clamp(3.5rem, 11vw, 6rem);
      --kicker-size: 0.82rem;
      --body-size: 0.86rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #111;
      display: grid;
      place-items: center;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: relative;
      width: min(100vw, var(--frame-width));
      height: min(100vh, var(--frame-height));
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 32%, rgba(255,255,255,0.7), transparent 30%),
        linear-gradient(180deg, #f5f3f0 0%, #efebe7 100%);
      isolation: isolate;
    }

    .paper-noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.9) 0.5px, transparent 0.75px),
        radial-gradient(circle at 70% 45%, rgba(0,0,0,0.7) 0.45px, transparent 0.75px),
        radial-gradient(circle at 50% 80%, rgba(0,0,0,0.65) 0.4px, transparent 0.75px);
      background-size: 20px 20px, 24px 24px, 18px 18px;
      z-index: 0;
      pointer-events: none;
    }

    .light-sweep {
      position: absolute;
      inset: -10% -25%;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.24) 42%,
        rgba(255,255,255,0.08) 50%,
        transparent 58%
      );
      transform: translateX(-120%) rotate(-6deg);
      z-index: 1;
      pointer-events: none;
      opacity: 0.8;
      filter: blur(10px);
    }

    .asset-wrap {
      position: absolute;
      left: 38px;
      top: 168px;
      width: var(--asset-width);
      z-index: 3;
      transform-origin: 50% 100%;
      will-change: transform;
    }

    .asset-stack {
      position: relative;
      width: 100%;
    }

    .asset,
    .asset-glitch-a,
    .asset-glitch-b {
      display: block;
      width: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .asset {
      position: relative;
      z-index: 3;
      filter: drop-shadow(0 22px 30px var(--shadow));
      will-change: transform, opacity, filter;
    }

    .asset-glitch-a,
    .asset-glitch-b {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
      will-change: transform, opacity;
    }

    .asset-glitch-a {
      z-index: 1;
      filter: drop-shadow(0 22px 30px rgba(0,0,0,0.06));
    }

    .asset-glitch-b {
      z-index: 2;
      filter: drop-shadow(0 22px 30px rgba(0,0,0,0.06));
    }

    .text-wrap {
      position: absolute;
      top: 118px;
      right: 34px;
      width: 44%;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .prehead,
    .date,
    .headline-line,
    .headline-line .core,
    .headline-line .ghost-a,
    .headline-line .ghost-b,
    .social {
      will-change: transform, opacity, filter;
    }

    .prehead {
      color: var(--muted);
      font-size: var(--kicker-size);
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
      max-width: 180px;
    }

    .date {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .headline {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 0.84;
      letter-spacing: -0.08em;
      color: var(--accent);
      font-family: "Times New Roman", Georgia, serif;
      font-weight: 500;
      font-size: var(--headline-size);
      text-transform: uppercase;
    }

    .headline-line {
      position: relative;
      display: block;
      min-height: 0.82em;
      text-shadow: 0 0 1px rgba(185,30,30,0.06);
    }

    .headline-line .core,
    .headline-line .ghost-a,
    .headline-line .ghost-b {
      position: absolute;
      inset: 0;
      display: block;
      white-space: nowrap;
    }

    .headline-line .core {
      position: relative;
      z-index: 3;
      color: var(--accent);
    }

    .headline-line .ghost-a {
      z-index: 1;
      color: rgba(0, 180, 255, 0.18);
      opacity: 0;
      transform: translateX(0);
    }

    .headline-line .ghost-b {
      z-index: 2;
      color: rgba(255, 0, 70, 0.22);
      opacity: 0;
      transform: translateX(0);
    }

    .social {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.01em;
    }

    .social-dots {
      display: inline-flex;
      gap: 4px;
    }

    .social-dots span {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.9;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, transparent 38%, rgba(0,0,0,0.04) 72%, rgba(0,0,0,0.1) 100%);
      z-index: 7;
      pointer-events: none;
    }

    @media (max-width: 520px) {
      .asset-wrap {
        left: 24px;
        top: 210px;
        width: 205px;
      }

      .text-wrap {
        top: 110px;
        right: 22px;
        width: 46%;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="paper-noise"></div>
    <div class="light-sweep"></div>

    <div class="asset-wrap">
      <div class="asset-stack">
        <!-- Replace all three with the same transparent bust/statue PNG -->
        <img
          class="asset-glitch-a"
          src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=900&q=80"
          alt=""
          aria-hidden="true"
        />
        <img
          class="asset-glitch-b"
          src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=900&q=80"
          alt=""
          aria-hidden="true"
        />
        <img
          class="asset"
          src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=900&q=80"
          alt="Bust asset"
        />
      </div>
    </div>

    <div class="text-wrap">
    
      <div class="date">21 de abril</div>

      <div class="headline">
        <span class="headline-line">
          <span class="ghost-a">TIRA</span>
          <span class="ghost-b">TIRA</span>
          <span class="core">TIRA</span>
        </span>
        <span class="headline-line">
          <span class="ghost-a">DEN</span>
          <span class="ghost-b">DEN</span>
          <span class="core">DEN</span>
        </span>
        <span class="headline-line">
          <span class="ghost-a">TES</span>
          <span class="ghost-b">TES</span>
          <span class="core">TES</span>
        </span>
      </div>

      <div class="social">
        <span class="social-dots">
          <span></span><span></span><span></span>
        </span>
      
      </div>
    </div>

    <div class="vignette"></div>
  </div>

  <script>
    const assetEase = "slow(0.18, 0.72, false)";

    gsap.set(".asset-wrap", {
      x: -150,
      y: 220,
      rotation: -11,
      scale: 0.84
    });

    gsap.set(".asset", {
      opacity: 0,
      filter: "blur(20px) drop-shadow(0 22px 30px rgba(0,0,0,0.12))"
    });

    gsap.set([".asset-glitch-a", ".asset-glitch-b"], {
      opacity: 0,
      x: 0,
      y: 0
    });

    gsap.set(".prehead", {
      y: 24,
      opacity: 0,
      filter: "blur(12px)"
    });

    gsap.set(".date", {
      y: 22,
      opacity: 0,
      filter: "blur(10px)"
    });

    gsap.set(".headline-line", {
      y: 42,
      opacity: 0,
      filter: "blur(16px)"
    });

    gsap.set(".social", {
      y: 16,
      opacity: 0,
      filter: "blur(8px)"
    });

    const tl = gsap.timeline({
      defaults: { ease: "power3.out" }
    });

    tl
      .to(".asset-wrap", {
        x: 0,
        y: 0,
        rotation: 0,
        scale: 1,
        duration: 1.8,
        ease: assetEase
      }, 0.02)

      .to(".asset", {
        opacity: 1,
        filter: "blur(0px) drop-shadow(0 22px 30px rgba(0,0,0,0.12))",
        duration: 1.45,
        ease: assetEase
      }, 0.06)

      .to(".light-sweep", {
        xPercent: 180,
        duration: 1.4,
        ease: "power2.out"
      }, 0.3)

      .to(".prehead", {
        y: 0,
        opacity: 1,
        filter: "blur(0px)",
        duration: 0.72,
        ease: "expo.out"
      }, 0.82)

      .to(".date", {
        y: 0,
        opacity: 1,
        filter: "blur(0px)",
        duration: 0.68,
        ease: "expo.out"
      }, 0.94)

      .to(".headline-line", {
        y: 0,
        opacity: 1,
        filter: "blur(0px)",
        stagger: 0.08,
        duration: 0.95,
        ease: "expo.out"
      }, 1.04)

      .to(".social", {
        y: 0,
        opacity: 1,
        filter: "blur(0px)",
        duration: 0.6
      }, 1.34)

      .add(() => glitchTextBurst(), 1.95)
      .add(() => glitchAssetBurst(), 2.06)
      .add(() => glitchTextBurst(0.75), 2.42)
      .add(() => glitchAssetBurst(0.7), 2.5);

    function glitchTextBurst(intensity = 1) {
      const lines = document.querySelectorAll(".headline-line");

      lines.forEach((line, i) => {
        const ghostA = line.querySelector(".ghost-a");
        const ghostB = line.querySelector(".ghost-b");

        const offsetA = (i % 2 === 0 ? -2 : -1.5) * intensity;
        const offsetB = (i % 2 === 0 ? 2.2 : 1.7) * intensity;

        gsap.killTweensOf([line, ghostA, ghostB]);

        const g = gsap.timeline();

        g.set([ghostA, ghostB], { opacity: 1 }, 0)
         .to(line, {
            x: 1.5 * intensity,
            duration: 0.03,
            ease: "none"
          }, 0)
         .to(ghostA, {
            x: offsetA,
            opacity: 0.9,
            duration: 0.03,
            ease: "none"
          }, 0)
         .to(ghostB, {
            x: offsetB,
            opacity: 0.9,
            duration: 0.03,
            ease: "none"
          }, 0)
         .to(line, {
            x: -1.3 * intensity,
            duration: 0.035,
            ease: "none"
          })
         .to(ghostA, {
            x: 1.2 * intensity,
            opacity: 0.6,
            duration: 0.035,
            ease: "none"
          }, "<")
         .to(ghostB, {
            x: -1.5 * intensity,
            opacity: 0.65,
            duration: 0.035,
            ease: "none"
          }, "<")
         .to(line, {
            x: 0,
            duration: 0.06,
            ease: "none"
          })
         .to(ghostA, {
            x: 0,
            opacity: 0,
            duration: 0.06,
            ease: "none"
          }, "<")
         .to(ghostB, {
            x: 0,
            opacity: 0,
            duration: 0.06,
            ease: "none"
          }, "<");
      });
    }

    function glitchAssetBurst(intensity = 1) {
      const a = document.querySelector(".asset-glitch-a");
      const b = document.querySelector(".asset-glitch-b");
      const main = document.querySelector(".asset");
      const wrap = document.querySelector(".asset-wrap");

      gsap.killTweensOf([a, b, main, wrap]);

      const g = gsap.timeline();

      g.set([a, b], { opacity: 0.7 }, 0)
       .set(a, { x: -3 * intensity, y: 0 }, 0)
       .set(b, { x: 3 * intensity, y: 0 }, 0)
       .to(wrap, {
          x: 1.4 * intensity,
          duration: 0.03,
          ease: "none"
        }, 0)
       .to(main, {
          skewX: -1.4 * intensity,
          duration: 0.03,
          ease: "none"
        }, 0)
       .to(a, {
          x: 2 * intensity,
          opacity: 0.45,
          duration: 0.04,
          ease: "none"
        })
       .to(b, {
          x: -2.4 * intensity,
          opacity: 0.45,
          duration: 0.04,
          ease: "none"
        }, "<")
       .to(wrap, {
          x: -1.2 * intensity,
          duration: 0.04,
          ease: "none"
        }, "<")
       .to(main, {
          skewX: 0.8 * intensity,
          duration: 0.04,
          ease: "none"
        }, "<")
       .to([a, b], {
          x: 0,
          y: 0,
          opacity: 0,
          duration: 0.07,
          ease: "none"
        })
       .to(wrap, {
          x: 0,
          duration: 0.07,
          ease: "none"
        }, "<")
       .to(main, {
          skewX: 0,
          duration: 0.07,
          ease: "none"
        }, "<");
    }

    gsap.to(".asset-wrap", {
      y: "-=6",
      duration: 3.8,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut",
      delay: 3.1
    });
  </script>
</body>
</html>
