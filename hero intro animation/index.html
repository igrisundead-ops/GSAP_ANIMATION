<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Floating Creator Asset Reveal</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Inter, Arial, sans-serif;
}

body {
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 45%),
    #000;
}

/*
CONFIG FEEL:
No 9:16 outer card anymore.
Only:
- top text
- red rectangular reveal
- image asset floating in
- cinematic blur + pulse + slide
*/

.scene {
  position: relative;
  width: 520px;
  height: 620px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.content {
  position: relative;
  width: 340px;
  height: 500px;
}

/* TOP TEXT */

.subtitle {
  position: absolute;
  top: 0;
  left: 0;
  font-size: 20px;
  font-weight: 500;
  color: #b33a3a;
  opacity: 0;
  filter: blur(8px);
  transform: translateY(20px);
  z-index: 5;
}

.line {
  position: absolute;
  top: 58px;
  width: 2px;
  height: 28px;
  background: rgba(179, 58, 58, 0.7);
  opacity: 0;
  transform: scaleY(0.2);
  transform-origin: top;
  z-index: 5;
}

.line.left {
  left: 0;
}

.line.right {
  right: 0;
}

/* RED RECTANGLE */

.accent-box {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 340px;
  background: #b10f0f;
  overflow: hidden;
  z-index: 1;

  opacity: 0;
  transform: scaleY(0.15);
  transform-origin: bottom center;
  filter: blur(14px);
}

/* IMAGE */

.image-wrap {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 92%;
  height: 300px;
  transform: translateX(-50%);
  z-index: 3;
  overflow: hidden;
}

.main-image {
  width: 100%;
  height: 100%;
  object-fit: cover;

  opacity: 0;
  filter: blur(18px);
  transform: translateY(80px) scale(0.92);
  will-change: transform, opacity, filter;
  user-select: none;
  -webkit-user-drag: none;
}

.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      circle at 50% 75%,
      rgba(177,15,15,0.14),
      transparent 40%
    );
  z-index: 0;
}

.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      circle at center,
      rgba(0,0,0,0) 45%,
      rgba(0,0,0,0.18) 72%,
      rgba(0,0,0,0.48) 100%
    );
  z-index: 10;
}
</style>
</head>
<body>

<div class="scene">
  <div class="glow"></div>

  <div class="content">

    <div class="subtitle" id="subtitle">
      a stand up comedian
    </div>

    <div class="line left"></div>
    <div class="line right"></div>

    <div class="accent-box"></div>

    <div class="image-wrap">
      <img
        class="main-image"
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=900&q=80"
        alt="creator"
      />
    </div>

  </div>

  <div class="vignette"></div>
</div>

<script>
const subtitle = document.querySelector(".subtitle");
const lines = document.querySelectorAll(".line");
const accentBox = document.querySelector(".accent-box");
const image = document.querySelector(".main-image");

const tl = gsap.timeline({
  defaults: {
    ease: "power3.out"
  }
});

tl

  /* text first */
  .to(subtitle, {
    opacity: 1,
    y: 0,
    filter: "blur(0px)",
    duration: 0.55
  }, 0)

  /* small side lines */
  .to(lines, {
    opacity: 1,
    scaleY: 1,
    stagger: 0.08,
    duration: 0.4
  }, 0.18)

  /* rectangle expands */
  .to(accentBox, {
    opacity: 1,
    scaleY: 1,
    filter: "blur(0px)",
    duration: 0.75,
    ease: "expo.out"
  }, 0.28)

  /* image slides into view */
  .to(image, {
    opacity: 1,
    y: 0,
    scale: 1,
    filter: "blur(0px)",
    duration: 0.9,
    ease: "expo.out"
  }, 0.48)

  /* pulse settle */
  .to(image, {
    scale: 1.035,
    duration: 0.18,
    repeat: 1,
    yoyo: true,
    ease: "sine.out"
  }, 1.15);

/* idle motion */

gsap.to(image, {
  y: "-=6",
  duration: 2.6,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});

gsap.to(accentBox, {
  y: "-=4",
  duration: 3.2,
  repeat: -1,
  yoyo: true,
  ease: "sine.inOut"
});
</script>

</body>
</html>
